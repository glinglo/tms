  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Do the credits expire?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Credits never expire. Buy once, use whenever you need."
        }
      },
      {
        "@type": "Question",
        "name": "How fresh is the data?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Results are scraped in real time when you search. Not from a cached database."
        }
      },
      {
        "@type": "Question",
        "name": "What fields are included in the CSV?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Business name, phone, address, website, star rating, review count, email (when available), coordinates, and Google Maps URL."
        }
      },
      {
        "@type": "Question",
        "name": "Is scraping Google Maps legal?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We only collect publicly available data. No login required, no private data accessed. The same information anyone can see by visiting Google Maps manually."
        }
      },
      {
        "@type": "Question",
        "name": "Can I open the CSV in Excel or Google Sheets?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, directly. No formatting or conversion needed."
        }
      },
      {
        "@type": "Question",
        "name": "What if my search returns fewer results than expected?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "You are only charged credits for the leads actually returned, never more."
        }
      },
      {
        "@type": "Question",
        "name": "Do you offer refunds?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Credits are non-refundable but they never expire, so they're never wasted."
        }
      },
      {
        "@type": "Question",
        "name": "Can I scrape businesses in any country?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Google Maps data is available worldwide. Just type any city, region, or country in the location field."
        }
      }
    ]
  }
  </script>
